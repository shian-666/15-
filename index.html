<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>XPath 问卷星实时统计</title>
    <style>
        body{font-family:微软雅黑;background:#f4f6f8;padding:20px}
        .box{max-width:1000px;background:white;padding:25px;border-radius:12px;margin:0 auto}
        .total{font-size:24px;color:red;margin:15px 0}
        table{width:100%;border-collapse:collapse;margin-top:20px}
        th,td{padding:12px;border-bottom:1px solid #eee}
        th{background:#f7fafc}
        button{padding:10px 20px;background:#0078d4;color:white;border:none;border-radius:6px;cursor:pointer}
    </style>
</head>
<body>
    <div class="box">
        <h1>📊 总数量统计</h1>
        <div class="total">总数量：<span id="total">0</span></div>
        <button onclick="start()">刷新数据</button>
        <table>
            <tr><th>序号</th><th>问卷名称</th><th>实时数值</th></tr>
            <tbody id="list"></tbody>
        </table>
    </div>

<script>
// ====================== 你只改这里：填 链接 + XPath ======================

        xpath: "//*[@id='ctl02_ContentPlaceHolder1_divStatData']/div[2]/div[2]/div/table/tbody/tr[5]/td[2]/b"
    },   
    {

        xpath: "//*[@id='ctl02_ContentPlaceHolder1_divStatData']/div[2]/div[2]/div/table/tbody/tr[5]/td[2]/b"
    },
    {
        name: "尼日利亚（NIG）",
        url: "https://www.wjx.cn/report/364654071.aspx",
        xpath: "//*[@id='ctl02_ContentPlaceHolder1_divStatData']/div[2]/div[2]/div/table/tbody/tr[5]/td[2]/b"
    },
    {
        name: "澳大利亚（AUS）",
        url: "https://www.wjx.cn/report/364626011.aspx",
        xpath: "//*[@id='ctl02_ContentPlaceHolder1_divStatData']/div[2]/div[2]/div/table/tbody/tr[5]/td[2]/b"
    },
    {

        url: "https://www.wjx.cn/report/364654672.aspx",

    },
    {
        name: "斯洛伐克（SLO）",
        url: "https://www.wjx.cn/report/364733111.aspx",
        xpath: "//*[@id='ctl02_ContentPlaceHolder1_divStatData']/div[2]/div[2]/div/table/tbody/tr[5]/td[2]/b"
    },
    {
        name: "捷克（CEZ）",
        url: "https://www.wjx.cn/report/364740071.aspx",

    {

    },
    {

        url: "https://www.wjx.cn/report/364708435.aspx",

    {

        url: "https://www.wjx.cn/report/364651683.aspx",

    },
    {
        name: "韩国",
        url: "https://www.wjx.cn/report/364621722.aspx",
        xpath: "//*[@id='ctl02_ContentPlaceHolder1_divStatData']/div[2]/div[2]/div/table/tbody/tr[5]/td[2]/b"
    },
    // 可以一直加到 20 个
];
// ======================================================================

async function start() {
    const total = document.getElementById("total");
    const table = document.getElementById("list");
    table.innerHTML = "";
    let sum = 0;

    for (let i = 0; i < list.length; i++) {
        let item = list[i];
        try {
            let res = await fetch(item.url);
            let text = await res.text();
            
            // 纯前端 XPath 解析
            let parser = new DOMParser();
            let doc = parser.parseFromString(text, 'text/html');
            let val = doc.evaluate(item.xpath, doc, null, XPathResult.STRING_TYPE, null).stringValue || 0;
            let num = parseInt(val) || 0;
            sum += num;

            table.innerHTML += `<tr><td>${i+1}</td><td>${item.name}</td><td><strong>${num}</strong></td></tr>`;
        } catch (e) {
            table.innerHTML += `<tr><td>${i+1}</td><td>${item.name}</td><td style="color:red">获取失败</td></tr>`;
        }
    }
    total.innerText = sum;
}

window.onload = start();
</script>
</body>
</html>
