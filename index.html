<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>问卷星实时统计</title>
    <style>
        body{font-family:微软雅黑;background:#f4f6f8;padding:20px}
        .box{max-width:1000px;background:white;padding:25px;border-radius:12px;margin:0 auto}
        .total{font-size:24px;color:red;margin:15px 0}
        table{width:100%;border-collapse:collapse;margin-top:20px}
        th,td{padding:12px;border-bottom:1px solid #eee;text-align:center;}
        th{background:#f7fafc}
        button{padding:10px 20px;background:#0078d4;color:white;border:none;border-radius:6px;cursor:pointer}
        button:disabled{background:#999;cursor:not-allowed}
        .error{color:red;font-weight:bold;}
    </style>
</head>
<body>
    <div class="box">
        <h1>📊 问卷星答卷实时统计</h1>
        <div class="total">总数量：<span id="total">0</span></div>
        <button id="btn" onclick="start()">刷新数据</button>
        <table>
            <tr><th>序号</th><th>国家/问卷名称</th><th>实时数值</th></tr>
            <tbody id="list"></tbody>
        </table>
    </div>

<script>
const list = [
    { name: "阿根廷（AGR）", url: "https://www.wjx.cn/report/364692255.aspx", xpath: "//*[@id='ctl02_ContentPlaceHolder1_divStatData']/div[2]/div[2]/div/table/tbody/tr[5]/td[2]/b" },
    { name: "埃及", url: "https://www.wjx.cn/report/364750940.aspx", xpath: "//*[@id='ctl02_ContentPlaceHolder1_divStatData']/div[2]/div[2]/div/table/tbody/tr[5]/td[2]/b" },
    { name: "希腊", url: "https://www.wjx.cn/report/364755272.aspx", xpath: "//*[@id='ctl02_ContentPlaceHolder1_divStatData']/div[2]/div[2]/div/table/tbody/tr[5]/td[2]/b" },
    { name: "尼日利亚（NIG）", url: "https://www.wjx.cn/report/364654071.aspx", xpath: "//*[@id='ctl02_ContentPlaceHolder1_divStatData']/div[2]/div[2]/div/table/tbody/tr[5]/td[2]/b" },
    { name: "澳大利亚（AUS）", url: "https://www.wjx.cn/report/364626011.aspx", xpath: "//*[@id='ctl02_ContentPlaceHolder1_divStatData']/div[2]/div[2]/div/table/tbody/tr[5]/td[2]/b" },
    { name: "美国（USA）", url: "https://www.wjx.cn/report/364654672.aspx", xpath: "//*[@id='ctl02_ContentPlaceHolder1_divStatData']/div[2]/div[2]/div/table/tbody/tr[5]/td[2]/b" },
    { name: "斯洛伐克（SLO）", url: "https://www.wjx.cn/report/364733111.aspx", xpath: "//*[@id='ctl02_ContentPlaceHolder1_divStatData']/div[2]/div[2]/div/table/tbody/tr[5]/td[2]/b" },
    { name: "捷克（CEZ）", url: "https://www.wjx.cn/report/364740071.aspx", xpath: "//*[@id='ctl02_ContentPlaceHolder1_divStatData']/div[2]/div[2]/div/table/tbody/tr[5]/td[2]/b" },
    { name: "俄罗斯（RUS）", url: "https://www.wjx.cn/report/364708155.aspx", xpath: "//*[@id='ctl02_ContentPlaceHolder1_divStatData']/div[2]/div[2]/div/table/tbody/tr[5]/td[2]/b" },
    { name: "印度", url: "https://www.wjx.cn/report/364708435.aspx", xpath: "//*[@id='ctl02_ContentPlaceHolder1_divStatData']/div[2]/div[2]/div/table/tbody/tr[5]/td[2]/b" },
    { name: "印度尼西亚", url: "https://www.wjx.cn/report/364692062.aspx", xpath: "//*[@id='ctl02_ContentPlaceHolder1_divStatData']/div[2]/div[2]/div/table/tbody/tr[5]/td[2]/b" },
    { name: "墨西哥（MEX）", url: "https://www.wjx.cn/report/364674108.aspx", xpath: "//*[@id='ctl02_ContentPlaceHolder1_divStatData']/div[2]/div[2]/div/table/tbody/tr[5]/td[2]/b" },
    { name: "荷兰（NET）", url: "https://www.wjx.cn/report/364663724.aspx", xpath: "//*[@id='ctl02_ContentPlaceHolder1_divStatData']/div[2]/div[2]/div/table/tbody/tr[5]/td[2]/b" },
    { name: "德国（GER）", url: "https://www.wjx.cn/report/364651683.aspx", xpath: "//*[@id='ctl02_ContentPlaceHolder1_divStatData']/div[2]/div[2]/div/table/tbody/tr[5]/td[2]/b" },
    { name: "韩国", url: "https://www.wjx.cn/report/364621722.aspx", xpath: "//*[@id='ctl02_ContentPlaceHolder1_divStatData']/div[2]/div[2]/div/table/tbody/tr[5]/td[2]/b" }
];

const proxyBase = "https://api.allorigins.win/raw?url=";

function sleep(ms){ return new Promise(resolve => setTimeout(resolve, ms)); }

async function fetchItem(item, index){
    try{
        const proxyUrl = proxyBase + encodeURIComponent(item.url);
        const res = await fetch(proxyUrl);
        const text = await res.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(text,"text/html");

        const val = doc.evaluate(item.xpath, doc, null, XPathResult.STRING_TYPE, null).stringValue.trim();

        if(!val) return {index, name:item.name, num:null};

        const num = parseInt(val.replace(/[^0-9]/g,""),10);
        if(isNaN(num)) return {index, name:item.name, num:null};

        return {index, name:item.name, num};
    }catch(e){
        return {index, name:item.name, num:null};
    }
}

async function start(){
    const total = document.getElementById("total");
    const table = document.getElementById("list");
    const btn = document.getElementById("btn");

    table.innerHTML = "";
    total.innerText = "0";
    btn.disabled = true;
    btn.innerText = "正在刷新...";

    let sum = 0;

    for(let i=0;i<list.length;i++){
        const res = await fetchItem(list[i],i);
        if(res.num!==null){
            sum += res.num;
            table.innerHTML += `<tr><td>${i+1}</td><td>${res.name}</td><td><strong>${res.num}</strong></td></tr>`;
        }else{
            table.innerHTML += `<tr><td>${i+1}</td><td>${res.name}</td><td class="error">获取失败</td></tr>`;
        }
        total.innerText = sum;
        await sleep(500);
    }

    btn.disabled = false;
    btn.innerText = "刷新数据";
}
</script>
</body>
</html>
