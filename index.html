<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>问卷实时统计</title>
    <style>
        body{font-family:微软雅黑;background:#f4f6f8;padding:20px}
        .box{max-width:1000px;background:white;padding:25px;border-radius:12px;margin:0 auto}
        .total{font-size:24px;color:red;margin:15px 0}
        table{width:100%;border-collapse:collapse;margin-top:20px}
        th,td{padding:12px;border-bottom:1px solid #eee;text-align:center;}
        th{background:#f7fafc}
        button{padding:10px 20px;background:#0078d4;color:white;border:none;border-radius:6px;cursor:pointer;margin-bottom:10px}
        .error{color:red;font-weight:bold;}
    </style>
</head>
<body>
    <div class="box">
        <h1>📊 问卷实时统计</h1>
        <div class="total">总数量：<span id="total">0</span></div>
        <button onclick="start()">刷新数据</button>
        <table>
            <tr><th>序号</th><th>问卷名称</th><th>实时数值</th></tr>
            <tbody id="list"></tbody>
        </table>
    </div>

<script>
// 问卷配置
const list = [
    {
        name: "问卷1",
        url: "https://www.wjx.cn/report/364755272.aspx",
        xpath: "//*[contains(text(),'已答卷数')]/following::span[1]"
    },
    // 可继续添加其他问卷
];

// 公共代理
const proxyBase = "https://api.allorigins.win/raw?url=";

// 自动刷新间隔（毫秒）
const REFRESH_INTERVAL = 60000; // 60 秒

async function fetchItem(item, index) {
    try {
        const proxyUrl = proxyBase + encodeURIComponent(item.url);
        let res = await fetch(proxyUrl);
        let text = await res.text();

        let parser = new DOMParser();
        let doc = parser.parseFromString(text, 'text/html');
        let val = doc.evaluate(item.xpath, doc, null, XPathResult.STRING_TYPE, null).stringValue || "0";
        let num = parseInt(val.replace(/[^0-9]/g, '')) || 0;

        return {index, name: item.name, num};
    } catch (e) {
        return {index, name: item.name, num: null};
    }
}

async function start() {
    const totalEl = document.getElementById("total");
    const tableEl = document.getElementById("list");
    tableEl.innerHTML = "";
    
    const promises = list.map((item, i) => fetchItem(item, i));
    const results = await Promise.all(promises);

    let sum = 0;
    results.forEach(res => {
        if(res.num !== null){
            sum += res.num;
            tableEl.innerHTML += `<tr><td>${res.index+1}</td><td>${res.name}</td><td><strong>${res.num}</strong></td></tr>`;
        } else {
            tableEl.innerHTML += `<tr><td>${res.index+1}</td><td>${res.name}</td><td class="error">获取失败</td></tr>`;
        }
    });

    totalEl.innerText = sum;
}

// 页面加载时启动
window.onload = () => {
    start();
    // 设置定时刷新
    setInterval(start, REFRESH_INTERVAL);
};
</script>
</body>
</html>
